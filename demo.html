<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossBot Demo — Obi Pet Hall</title>
<style>
body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 40px 20px; background: #f5f5f5; }
h1 { color: #2D3436; }
h2 { color: #636E72; font-size: 1.1rem; }
.card { background: white; border-radius: 12px; padding: 24px; margin: 20px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.test-btn { padding: 10px 20px; margin: 6px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 0.9rem; }
.test-btn:hover { background: #6C5CE7; color: white; border-color: #6C5CE7; }
.status { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; }
.status-ok { background: #d4edda; color: #155724; }
.status-warn { background: #fff3cd; color: #856404; }
</style>
</head>
<body>

<h1>🐾 CrossBot Demo</h1>
<h2>Obi Pet Hall AI客服测试页</h2>

<div class="card">
  <h3>Server Status: <span class="status status-ok" id="status">Checking...</span></h3>
  <p>Backend: <code>http://localhost:3456</code></p>
  <p>15 template rules + DeepSeek AI fallback</p>
</div>

<div class="card">
  <h3>Quick Chat Tests (via API)</h3>
  <button class="test-btn" onclick="testChat('How do I return my order?')">🔄 Return</button>
  <button class="test-btn" onclick="testChat('How long does shipping take?')">📦 Shipping</button>
  <button class="test-btn" onclick="testChat('Do you offer free shipping?')">🚚 Free Shipping</button>
  <button class="test-btn" onclick="testChat('Where is my order LY123456789CN?')">🔍 Track</button>
  <button class="test-btn" onclick="testChat('What payment methods do you accept?')">💳 Payment</button>
  <button class="test-btn" onclick="testChat('Do you have cooling mats for large dogs?')">🤖 AI Query</button>
  <div id="apiResult" style="margin-top:16px;padding:12px;background:#f8f9fa;border-radius:8px;font-size:14px;white-space:pre-wrap;"></div>
</div>

<div class="card">
  <h3>👇 Live Widget — Click the purple chat bubble (bottom-right)</h3>
  <p style="color:#888;font-size:0.9rem">Test real conversation flow: click → type → get responses</p>
</div>

<!-- CrossBot Widget -->
<script src="http://localhost:3456/api/widget"></script>
<cross-bot server="http://localhost:3456"></cross-bot>

<script>
// Health check on load
fetch('http://localhost:3456/api/health')
  .then(r => r.json())
  .then(d => {
    document.getElementById('status').textContent = `✅ Online (${d.provider})`;
    document.getElementById('status').className = 'status status-ok';
  })
  .catch(() => {
    document.getElementById('status').textContent = '❌ Offline';
    document.getElementById('status').className = 'status status-warn';
  });

async function testChat(msg) {
  const el = document.getElementById('apiResult');
  el.textContent = '⏳ Sending...';
  try {
    const r = await fetch('http://localhost:3456/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg, sessionId: 'demo_' + Date.now()})
    });
    const d = await r.json();
    el.textContent = `🔹 Source: ${d.source} | Handler: ${d.handler}\n${'─'.repeat(50)}\n${d.reply}`;
  } catch(e) {
    el.textContent = '❌ Error: ' + e.message;
  }
}
</script>
</body>
</html>
